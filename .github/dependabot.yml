version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'Europe/Rome'
    open-pull-requests-limit: 5
    versioning-strategy: 'increase-if-necessary'
    labels: ['deps', 'rtgb']
    groups:
      types:
        patterns:
          - '@types/*'
      vitest:
        patterns:
          - 'vitest'
          - '@vitest/*'
      testing-library:
        patterns:
          - '@testing-library/*'
      storybook:
        patterns:
          - 'storybook'
          - '@storybook/*'
      eslint:
        patterns:
          - 'eslint'
          - 'eslint-*'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    labels: ['ci', 'rtgb']
