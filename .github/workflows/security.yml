name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install gitleaks CLI
        # Self-hosted install of the open-source CLI (Apache 2.0). The previous
        # gitleaks/gitleaks-action@v2 requires a paid licence for GitHub
        # organisations as of 2024-08; the upstream binary does not.
        env:
          GITLEAKS_VERSION: 8.21.2
        run: |
          set -euo pipefail
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Run gitleaks
        run: gitleaks detect --source . --verbose --redact --exit-code 1

  npm-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'
      - run: npm install -g npm@11
      - run: npm ci --no-audit --no-fund
      - name: npm audit (production deps)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true
      - name: npm audit JSON report
        run: npm audit --omit=dev --json > audit-report.json || true
      - uses: actions/upload-artifact@v7
        with:
          name: npm-audit-report
          path: audit-report.json
          retention-days: 30

  semgrep:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v6
      - run: semgrep ci --config=p/owasp-top-ten --config=p/typescript --config=p/javascript --config=p/secrets
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true
