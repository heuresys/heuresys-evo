name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: scope
        uses: ./.github/actions/handoff-only-detect
      - if: steps.scope.outputs.handoff_only == 'true'
        run: echo "Handoff-only PR — emitting fast green status (lint skipped, no source changes)"
      - uses: actions/setup-node@v6
        if: steps.scope.outputs.handoff_only != 'true'
        with:
          node-version: '20'
          cache: 'npm'
      - if: steps.scope.outputs.handoff_only != 'true'
        run: npm install -g npm@11
      - if: steps.scope.outputs.handoff_only != 'true'
        run: npm ci
      - name: Generate Prisma clients (offline from schema)
        if: steps.scope.outputs.handoff_only != 'true'
        run: |
          npx --prefix services/app prisma generate --schema services/app/prisma/schema.prisma
          npx --prefix services/api-gateway prisma generate --schema services/api-gateway/prisma/schema.prisma
      - if: steps.scope.outputs.handoff_only != 'true'
        run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    env:
      # services/app's transitive closure (566 Prisma models + 180 UI components +
      # the brand-studio page) overflows the default 2GB V8 heap during tsc.
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: scope
        uses: ./.github/actions/handoff-only-detect
      - if: steps.scope.outputs.handoff_only == 'true'
        run: echo "Handoff-only PR — emitting fast green status (typecheck skipped, no source changes)"
      - uses: actions/setup-node@v6
        if: steps.scope.outputs.handoff_only != 'true'
        with:
          node-version: '20'
          cache: 'npm'
      - if: steps.scope.outputs.handoff_only != 'true'
        run: npm install -g npm@11
      - if: steps.scope.outputs.handoff_only != 'true'
        run: npm ci
      - name: Generate Prisma clients (offline from schema)
        if: steps.scope.outputs.handoff_only != 'true'
        run: |
          npx --prefix services/app prisma generate --schema services/app/prisma/schema.prisma
          npx --prefix services/api-gateway prisma generate --schema services/api-gateway/prisma/schema.prisma
      - if: steps.scope.outputs.handoff_only != 'true'
        run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    services:
      # NB: Postgres è bare-metal nel design (vedi ADR-0001).
      # Niente service container Postgres qui.
      # Test che richiedono DB usano secret DATABASE_URL_TEST verso un
      # Postgres reale di test, oppure provisioning on-demand con
      # testcontainers-node nel job stesso.
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: scope
        uses: ./.github/actions/handoff-only-detect
      - if: steps.scope.outputs.handoff_only == 'true'
        run: echo "Handoff-only PR — emitting fast green status (tests skipped, no source changes)"
      - uses: actions/setup-node@v6
        if: steps.scope.outputs.handoff_only != 'true'
        with:
          node-version: '20'
          cache: 'npm'
      - if: steps.scope.outputs.handoff_only != 'true'
        run: npm install -g npm@11
      - if: steps.scope.outputs.handoff_only != 'true'
        run: npm ci
      - if: steps.scope.outputs.handoff_only != 'true'
        run: npm run test:unit
      - if: steps.scope.outputs.handoff_only != 'true'
        run: npm run test:integration
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_TEST }}
          REDIS_URL: redis://localhost:6379
