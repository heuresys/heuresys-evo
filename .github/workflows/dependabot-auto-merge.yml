name: Dependabot Auto-merge

# Auto-merge Dependabot PRs that are low-risk (patch + minor + grouped).
# Major bumps are intentionally excluded — they get manual review since
# breaking changes can hide in semver-major even within a grouped PR.
#
# Flow:
# 1. Dependabot opens PR (grouped per .github/dependabot.yml).
# 2. This workflow inspects the PR via dependabot/fetch-metadata.
# 3. If update-type is patch / minor / grouped → enable auto-merge (squash).
#    If major → leave PR open, label "needs-manual-review", do not auto-merge.
# 4. Branch protection's required checks must still pass before the merge fires;
#    auto-merge only signals intent, GitHub waits for green CI as usual.

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'

      - name: Auto-merge patch + minor + grouped
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
          steps.metadata.outputs.update-type == 'version-update:semver-minor' ||
          steps.metadata.outputs.dependency-group != ''
        run: gh pr merge --squash --auto --delete-branch "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Flag major bumps for manual review
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-major' &&
          steps.metadata.outputs.dependency-group == ''
        run: |
          gh pr edit "$PR_URL" --add-label "needs-manual-review"
          gh pr comment "$PR_URL" --body "Major version bump detected — auto-merge intentionally skipped. Review breaking changes in upstream changelog before merging."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
