name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-workspaces:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: scope
        uses: ./.github/actions/handoff-only-detect
      - if: steps.scope.outputs.handoff_only == 'true'
        run: echo "Handoff-only PR — emitting fast green status (build skipped, no source changes)"
      - uses: actions/setup-node@v6
        if: steps.scope.outputs.handoff_only != 'true'
        with:
          node-version: '20.x'
          cache: 'npm'
      - if: steps.scope.outputs.handoff_only != 'true'
        run: npm install -g npm@11
      - if: steps.scope.outputs.handoff_only != 'true'
        run: npm ci --no-audit --no-fund
      - name: Generate Prisma clients (offline from schema)
        if: steps.scope.outputs.handoff_only != 'true'
        run: |
          npx --prefix services/app prisma generate --schema services/app/prisma/schema.prisma
          npx --prefix services/api-gateway prisma generate --schema services/api-gateway/prisma/schema.prisma
      - if: steps.scope.outputs.handoff_only != 'true'
        run: npm run build --workspaces --if-present
        env:
          NEXT_TELEMETRY_DISABLED: '1'
