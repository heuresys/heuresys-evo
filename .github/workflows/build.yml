name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-workspaces:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'
      - run: npm install -g npm@11
      - run: npm ci --no-audit --no-fund
      - name: Generate Prisma clients (offline from schema)
        run: |
          npx --prefix services/app prisma generate --schema services/app/prisma/schema.prisma
          npx --prefix services/api-gateway prisma generate --schema services/api-gateway/prisma/schema.prisma
      - run: npm run build --workspaces --if-present
        env:
          NEXT_TELEMETRY_DISABLED: '1'
