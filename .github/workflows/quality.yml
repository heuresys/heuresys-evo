name: Quality

on:
  pull_request:
    branches: [main]

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

# Consolidates the previous ci.yml (lint + typecheck + test) and build.yml
# (build-workspaces) into one workflow. Job names are preserved verbatim so
# branch protection's required-checks list keeps matching without API
# changes. All jobs share the .github/actions/setup-node-prisma composite
# (single point of truth for checkout + node + npm + prisma generate cache).
#
# Jobs guard heavy steps on .github/actions/handoff-only-detect so docs-only
# PRs land green in <60s.

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: scope
        uses: ./.github/actions/handoff-only-detect
      - if: steps.scope.outputs.handoff_only == 'true'
        run: echo "Handoff-only PR — emitting fast green status (lint skipped, no source changes)"
      - if: steps.scope.outputs.handoff_only != 'true'
        uses: ./.github/actions/setup-node-prisma
        with:
          fetch-depth: '1'
      - if: steps.scope.outputs.handoff_only != 'true'
        run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    env:
      # services/app's transitive closure (566 Prisma models + 180 UI components +
      # the brand-studio page) overflows the default 2GB V8 heap during tsc.
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: scope
        uses: ./.github/actions/handoff-only-detect
      - if: steps.scope.outputs.handoff_only == 'true'
        run: echo "Handoff-only PR — emitting fast green status (typecheck skipped, no source changes)"
      - if: steps.scope.outputs.handoff_only != 'true'
        uses: ./.github/actions/setup-node-prisma
        with:
          fetch-depth: '1'
      - if: steps.scope.outputs.handoff_only != 'true'
        run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    # NB: Postgres è bare-metal nel design (vedi ADR-0001 + ADR-0023 + ADR-0027).
    # Niente service container Postgres, niente Docker. Test integration installa
    # Postgres bare-metal via apt (vedi ADR-0027). Redis idem (apt install).
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: scope
        uses: ./.github/actions/handoff-only-detect
      - if: steps.scope.outputs.handoff_only == 'true'
        run: echo "Handoff-only PR — emitting fast green status (tests skipped, no source changes)"
      - if: steps.scope.outputs.handoff_only != 'true'
        uses: ./.github/actions/setup-node-prisma
        with:
          fetch-depth: '1'
      - if: steps.scope.outputs.handoff_only != 'true'
        name: Install Postgres 16 + pgvector + Redis (bare-metal — ADR-0027)
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          sudo apt-get install -y postgresql-16 postgresql-16-pgvector redis-server
          sudo systemctl start postgresql redis-server
          sudo -u postgres psql -c "CREATE USER heuresys WITH PASSWORD 'heuresys'; CREATE DATABASE heuresys_test OWNER heuresys; GRANT ALL ON DATABASE heuresys_test TO heuresys;"
      - if: steps.scope.outputs.handoff_only != 'true'
        run: npm run test:unit -- --coverage
      - if: steps.scope.outputs.handoff_only != 'true'
        run: npm run test:integration
        env:
          DATABASE_URL: postgresql://heuresys:heuresys@localhost:5432/heuresys_test
          DATABASE_URL_TEST: postgresql://heuresys:heuresys@localhost:5432/heuresys_test
          REDIS_URL: redis://localhost:6379
      - if: steps.scope.outputs.handoff_only != 'true'
        name: Coverage threshold gate (ADR-0011)
        run: |
          # Threshold target: api-gateway 70%, shared 90%, ui 80% (vedi vitest.config.ts)
          # Per-workspace threshold enforced inline da Vitest (passing == coverage gate).
          echo "Coverage gate enforced via per-workspace vitest.config.ts thresholds"

  build-workspaces:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: scope
        uses: ./.github/actions/handoff-only-detect
      - if: steps.scope.outputs.handoff_only == 'true'
        run: echo "Handoff-only PR — emitting fast green status (build skipped, no source changes)"
      - if: steps.scope.outputs.handoff_only != 'true'
        uses: ./.github/actions/setup-node-prisma
        with:
          fetch-depth: '1'
      - if: steps.scope.outputs.handoff_only != 'true'
        run: npm run build --workspaces --if-present
        env:
          NEXT_TELEMETRY_DISABLED: '1'
