name: Storybook Deploy

on:
  push:
    branches: [main]
    paths:
      - 'packages/ui/**'
      - '.github/workflows/storybook.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/ui/**'
      - '.github/workflows/storybook.yml'
  workflow_dispatch:

# Single concurrent deployment; in-progress runs finish, queued runs collapse to latest.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook --workspace=packages/ui

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/ui/storybook-static

  deploy:
    needs: build
    # Deploy only on push to main / manual dispatch (PRs build but don't publish)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
