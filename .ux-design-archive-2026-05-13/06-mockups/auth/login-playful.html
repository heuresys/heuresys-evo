<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Accedi — heuresys (Magnetic Playful)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  /* Heuresys Login — Magnetic Playful variant
     Mood: minimal-pop · geometric shapes · magnetic hover · animated underline · parallax wordmark
  */
  :root {
    --bg: #faf9f7;
    --paper: #ffffff;
    --surface-1: #ffffff;
    --surface-2: #f0eef5;
    --ink: #0a0d18;
    --ink-soft: #2a2d38;
    --ink-muted: #6a6d75;
    --ink-tertiary: #9ea0a8;
    --rule: #e2e0e8;
    --rule-strong: #c8c5d0;
    --primary: #3b82f6;
    --primary-deep: #2452c8;
    --accent: #a855f7;
    --accent-deep: #7e3fc8;
    --accent-soft: #f1e7fa;
    --shape-1: #fde6c4;
    --shape-2: #c8e0fb;
    --shape-3: #e9d4f9;
  }
  [data-theme="dark"] {
    --bg: #0a0d18;
    --paper: #14182a;
    --surface-1: #14182a;
    --surface-2: #1c2138;
    --ink: #f4f5f7;
    --ink-soft: #c8cad2;
    --ink-muted: #8b8e99;
    --ink-tertiary: #5e6168;
    --rule: #232838;
    --rule-strong: #3a4055;
    --accent-soft: #2a1a44;
    --shape-1: #4a3a18;
    --shape-2: #1a2e54;
    --shape-3: #381f4f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow-x: hidden; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased; line-height: 1.5;
    transition: background 0.2s linear, color 0.15s linear;
    font-feature-settings: 'tnum' 1, 'cv11' 1;
    display: flex; flex-direction: column; min-height: 100vh;
    position: relative;
  }

  /* Floating geometric shapes — pastel pop */
  .shapes { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .shape {
    position: absolute; border-radius: 24px;
    opacity: 0.7;
    animation: bob 16s ease-in-out infinite;
  }
  [data-theme="dark"] .shape { opacity: 0.45; }
  .shape-circle { border-radius: 50%; }
  .shape-1 { background: var(--shape-1); width: 220px; height: 220px; top: 10%;  left: -60px;  animation-delay: -1s;  transform: rotate(-12deg); }
  .shape-2 { background: var(--shape-2); width: 180px; height: 180px; top: 65%;  left: 8%;     animation-delay: -8s;  border-radius: 50%; }
  .shape-3 { background: var(--shape-3); width: 240px; height: 200px; top: 18%;  right: -40px; animation-delay: -4s;  transform: rotate(18deg); }
  .shape-4 { background: var(--accent); opacity: 0.10; width: 140px; height: 140px; top: 78%; right: 12%; animation-delay: -12s; border-radius: 50%; }
  .shape-5 { background: var(--primary); opacity: 0.10; width: 120px; height: 120px; top: 42%; right: 38%; animation-delay: -6s; border-radius: 50%; }
  @keyframes bob {
    0%, 100% { transform: translate(0, 0) rotate(var(--r, 0deg)); }
    33%      { transform: translate(12px, -16px) rotate(calc(var(--r, 0deg) + 6deg)); }
    66%      { transform: translate(-8px, 14px) rotate(calc(var(--r, 0deg) - 4deg)); }
  }
  .shape-1 { --r: -12deg; }
  .shape-3 { --r: 18deg; }

  /* Top bar */
  .top-bar {
    position: relative; z-index: 2;
    padding: 18px 28px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .top-back {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--ink-muted); text-decoration: none;
    transition: color 0.15s, transform 0.2s;
  }
  .top-back:hover { color: var(--accent); transform: translateX(-3px); }

  /* L25 + L27 wordmark inline utility (two-color legacy) */
  .wm-inline {
    font-family: 'Exo 2', sans-serif;
    font-weight: 700;
    letter-spacing: normal;
    text-transform: lowercase;
    color: var(--primary);
  }
  .wm-inline .y { color: var(--accent); }
  .theme-toggle {
    background: var(--surface-1); border: 1px solid var(--rule); color: var(--ink);
    padding: 8px 14px; font-family: 'JetBrains Mono', monospace; font-size: 11px;
    cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
    border-radius: 999px;
    transition: background 0.2s, color 0.2s, transform 0.2s, border-color 0.2s;
  }
  .theme-toggle:hover { background: var(--accent); color: #fff; border-color: var(--accent); transform: rotate(8deg); }

  /* Main */
  .auth-main {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 32px 24px; position: relative; z-index: 1;
  }

  /* Card — playful soft */
  .auth-card {
    width: 100%; max-width: 460px;
    background: var(--surface-1);
    border: 1px solid var(--rule);
    border-radius: 28px;
    padding: 48px 44px 36px;
    box-shadow: 0 30px 70px rgba(10, 13, 24, 0.08), 0 4px 12px rgba(168, 85, 247, 0.06);
    position: relative;
  }
  [data-theme="dark"] .auth-card {
    box-shadow: 0 30px 70px rgba(0, 0, 0, 0.45), 0 4px 12px rgba(168, 85, 247, 0.10);
  }

  /* Wordmark hero — L25 + L27 (two-color legacy pattern) + parallax JS */
  .wordmark-hero {
    font-family: 'Exo 2', sans-serif;
    font-weight: 700; font-size: 60px;
    letter-spacing: -2.5px; line-height: 1;
    text-align: center; margin-bottom: 14px;
    color: var(--primary);
    transition: transform 0.18s cubic-bezier(0.22, 1, 0.36, 1);
    will-change: transform;
  }
  .wordmark-hero .y { color: var(--accent); }

  .auth-tagline {
    font-size: 14px; color: var(--ink-muted);
    text-align: center; margin-bottom: 32px;
  }

  /* Tenant context — playful pop */
  .tenant-context {
    display: flex; align-items: center; gap: 12px;
    background: var(--accent-soft);
    border: 2px solid transparent;
    border-radius: 14px; padding: 12px 14px; margin-bottom: 26px;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.25s;
  }
  .tenant-context:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(168, 85, 247, 0.20);
  }
  .tenant-avatar {
    width: 36px; height: 36px; flex-shrink: 0; border-radius: 10px;
    border: 2px solid var(--primary);
    background: var(--bg); color: var(--accent);
    font-family: 'Inter'; font-weight: 700; font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    letter-spacing: 0.5px;
  }
  .tenant-info { flex: 1; min-width: 0; }
  .tenant-name { font-weight: 600; font-size: 13px; color: var(--ink); line-height: 1.2; }
  .tenant-meta {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--ink-muted); letter-spacing: 0.5px; margin-top: 2px;
  }
  .tenant-switch {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--primary); font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px;
    background: transparent; border: none; cursor: pointer;
    padding: 6px 8px; border-radius: 6px;
    transition: color 0.15s, background 0.15s;
  }
  .tenant-switch:hover { color: var(--accent); background: rgba(168, 85, 247, 0.10); }

  /* Form — animated underline */
  .auth-form { display: flex; flex-direction: column; gap: 18px; }
  .field { display: flex; flex-direction: column; gap: 6px; position: relative; }
  .field-label {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--ink-muted); font-weight: 600;
  }
  .field-input-wrap {
    position: relative;
  }
  .field-input {
    width: 100%;
    background: transparent;
    border: none; border-bottom: 2px solid var(--rule);
    border-radius: 0; padding: 10px 0;
    font-family: 'Inter'; font-size: 16px; color: var(--ink);
    outline: none;
  }
  .field-input::placeholder { color: var(--ink-tertiary); }
  .field-underline {
    position: absolute; bottom: 0; left: 0;
    height: 2px; width: 0%;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    transition: width 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    pointer-events: none;
  }
  .field-input:focus ~ .field-underline { width: 100%; }

  .field-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 6px; font-size: 12px;
  }
  .checkbox-label { display: flex; align-items: center; gap: 8px; color: var(--ink-soft); cursor: pointer; }
  .checkbox-label input { accent-color: var(--accent); cursor: pointer; }
  .forgot-link {
    color: var(--primary); text-decoration: none; font-weight: 500;
    transition: color 0.15s, transform 0.18s;
  }
  .forgot-link:hover { color: var(--accent); transform: translateX(2px); }

  /* Buttons — magnetic */
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 14px 18px; border-radius: 14px;
    font-family: 'Inter'; font-size: 14px; font-weight: 600;
    cursor: pointer; border: 1px solid transparent; text-decoration: none;
    transition: transform 0.18s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.25s, background 0.2s, border-color 0.2s;
    will-change: transform;
  }
  .btn-primary {
    background: var(--accent); color: #ffffff;
    margin-top: 14px;
    box-shadow: 0 6px 18px rgba(168, 85, 247, 0.30);
  }
  .btn-primary:hover {
    background: var(--accent-deep);
    box-shadow: 0 12px 30px rgba(168, 85, 247, 0.45);
  }
  .btn-secondary {
    background: var(--surface-1); color: var(--ink);
    border-color: var(--rule);
  }
  [data-theme="dark"] .btn-secondary { background: var(--surface-2); }
  .btn-secondary:hover {
    border-color: var(--accent); background: var(--accent-soft);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(168, 85, 247, 0.18);
  }
  .btn-icon { width: 16px; height: 16px; flex-shrink: 0; }

  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 24px 0 16px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    text-transform: uppercase; letter-spacing: 1.5px; color: var(--ink-muted);
  }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--rule); }
  .sso-group { display: flex; flex-direction: column; gap: 10px; }

  .auth-footnote {
    font-size: 12px; color: var(--ink-muted); text-align: center;
    margin-top: 28px; padding-top: 22px; border-top: 1px dashed var(--rule);
  }
  .auth-footnote a { color: var(--primary); text-decoration: none; transition: color 0.15s; }
  .auth-footnote a:hover { color: var(--accent); }

  /* Footer */
  .auth-footer {
    padding: 22px 24px 28px; text-align: center;
    font-size: 11px; color: var(--ink-tertiary);
    position: relative; z-index: 1;
  }
  .auth-footer .copy { font-family: 'JetBrains Mono', monospace; letter-spacing: 0.5px; }
  .auth-footer .wordmark-foot { font-family: 'Exo 2', sans-serif; font-weight: 700; }
  .auth-footer .wordmark-foot .y { color: var(--accent); }
  .auth-footer .links { margin-top: 8px; display: flex; justify-content: center; gap: 16px; }
  .auth-footer .links a {
    color: var(--ink-muted); text-decoration: none;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    text-transform: uppercase; letter-spacing: 1px;
    transition: color 0.15s, transform 0.18s;
  }
  .auth-footer .links a:hover { color: var(--accent); transform: translateY(-2px); }

  @media (prefers-reduced-motion: reduce) {
    .shape, .wordmark-hero, .btn, .field-underline,
    .top-back, .forgot-link, .auth-footer .links a, .theme-toggle, .tenant-context {
      animation: none !important; transition: none !important;
    }
  }
  @media (max-width: 480px) {
    .auth-card { padding: 36px 28px 28px; border-radius: 24px; }
    .wordmark-hero { font-size: 48px; letter-spacing: -2px; }
  }
</style>
</head>
<body>

<div class="shapes" aria-hidden="true">
  <div class="shape shape-1"></div>
  <div class="shape shape-2 shape-circle"></div>
  <div class="shape shape-3"></div>
  <div class="shape shape-4 shape-circle"></div>
  <div class="shape shape-5 shape-circle"></div>
</div>

<header class="top-bar">
  <a href="#" class="top-back">← heuresys.com</a>
  <button class="theme-toggle" id="themeToggle" type="button">LIGHT</button>
</header>

<main class="auth-main">
  <section class="auth-card" aria-labelledby="auth-heading">
    <h1 id="auth-heading" class="wordmark-hero" data-parallax>heures<span class="y">y</span>s</h1>
    <p class="auth-tagline">Accedi al tuo workspace</p>

    <div class="tenant-context" aria-label="Tenant corrente">
      <div class="tenant-avatar" aria-hidden="true">RB</div>
      <div class="tenant-info">
        <div class="tenant-name">RTL Bank</div>
        <div class="tenant-meta">rtl-bank.heuresys.com · Banking · Production</div>
      </div>
      <button type="button" class="tenant-switch" aria-label="Cambia tenant">CAMBIA</button>
    </div>

    <form class="auth-form" novalidate onsubmit="event.preventDefault();">
      <div class="field">
        <label class="field-label" for="email">Email aziendale</label>
        <div class="field-input-wrap">
          <input class="field-input" type="email" id="email" name="email" placeholder="maria.chro@rtl-bank.org" autocomplete="username" required />
          <span class="field-underline"></span>
        </div>
      </div>
      <div class="field">
        <label class="field-label" for="password">Password</label>
        <div class="field-input-wrap">
          <input class="field-input" type="password" id="password" name="password" placeholder="••••••••••" autocomplete="current-password" required />
          <span class="field-underline"></span>
        </div>
      </div>
      <div class="field-row">
        <label class="checkbox-label">
          <input type="checkbox" name="remember" />
          <span>Ricordami su questo dispositivo</span>
        </label>
        <a href="#" class="forgot-link">Password dimenticata?</a>
      </div>
      <button type="submit" class="btn btn-primary" data-magnetic>Accedi</button>
    </form>

    <div class="divider"><span>oppure</span></div>

    <div class="sso-group">
      <button type="button" class="btn btn-secondary" data-magnetic>
        <svg class="btn-icon" viewBox="0 0 23 23" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="1" y="1" width="10" height="10" fill="#f25022"/>
          <rect x="12" y="1" width="10" height="10" fill="#7fba00"/>
          <rect x="1" y="12" width="10" height="10" fill="#00a4ef"/>
          <rect x="12" y="12" width="10" height="10" fill="#ffb900"/>
        </svg>
        Continua con Microsoft 365
      </button>
      <button type="button" class="btn btn-secondary" data-magnetic>
        <svg class="btn-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A10.99 10.99 0 0 0 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.99 10.99 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1A10.99 10.99 0 0 0 2.18 7.07l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z"/>
        </svg>
        Continua con Google Workspace
      </button>
    </div>

    <div class="auth-footnote">
      Non hai un account? <a href="#">Contatta il tuo IT_ADMIN</a><br />
      oppure <a href="#">richiedi una demo</a>
    </div>
  </section>
</main>

<footer class="auth-footer">
  <div class="copy">© 2026 heuresys.com — Organizational Intelligence platform</div>
  <div class="links">
    <a href="#">Privacy</a><a href="#">Terms</a><a href="#">Security</a><a href="#">Status</a>
  </div>
</footer>

<script>
  /* Theme persistence */
  (function () {
    const KEY = 'heuresys-theme';
    const body = document.body;
    const btn = document.getElementById('themeToggle');
    const stored = localStorage.getItem(KEY);
    if (stored === 'light' || stored === 'dark') body.setAttribute('data-theme', stored);
    function apply() {
      const t = body.getAttribute('data-theme');
      btn.textContent = t === 'dark' ? 'DARK' : 'LIGHT';
    }
    apply();
    btn.addEventListener('click', function () {
      const cur = body.getAttribute('data-theme');
      const next = cur === 'dark' ? 'light' : 'dark';
      if (next === 'light') body.removeAttribute('data-theme'); else body.setAttribute('data-theme', 'dark');
      localStorage.setItem(KEY, next);
      apply();
    });
  })();

  /* Magnetic buttons */
  (function () {
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    const STRENGTH = 0.18;
    document.querySelectorAll('[data-magnetic]').forEach(function (el) {
      el.addEventListener('mousemove', function (e) {
        const rect = el.getBoundingClientRect();
        const x = e.clientX - rect.left - rect.width / 2;
        const y = e.clientY - rect.top - rect.height / 2;
        el.style.transform = 'translate(' + x * STRENGTH + 'px,' + y * STRENGTH + 'px)';
      });
      el.addEventListener('mouseleave', function () { el.style.transform = ''; });
    });
  })();

  /* Wordmark mouse parallax */
  (function () {
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    const wm = document.querySelector('[data-parallax]');
    if (!wm) return;
    const STRENGTH = 6;
    document.addEventListener('mousemove', function (e) {
      const x = (e.clientX / window.innerWidth - 0.5) * STRENGTH;
      const y = (e.clientY / window.innerHeight - 0.5) * STRENGTH;
      wm.style.transform = 'translate(' + x + 'px,' + y + 'px)';
    });
  })();
</script>

</body>
</html>
