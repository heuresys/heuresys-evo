<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Accedi — Heuresys</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  /* Heuresys Login — Phase 10 surface 1/5
     Layout: no-chrome fullscreen
     Template base: mu-architect-legacy.html (D1 modello base · L21)
     Logo standard: L25 PERMANENT (lowercase · 8 identiche · color-only differentiator)
     DESIGN.md compliant
  */

  :root {
    --bg: #0a0d18;
    --paper: #14182a;
    --surface-1: #14182a;
    --surface-2: #1c2138;
    --surface-3: #252b48;
    --ink: #f4f5f7;
    --ink-soft: #c8cad2;
    --ink-muted: #8b8e99;
    --ink-tertiary: #5e6168;
    --rule: #232838;
    --rule-strong: #3a4055;
    --brand-blue: #3b82f6;
    --brand-blue-deep: #2452c8;
    --accent: #a855f7;
    --accent-deep: #7e3fc8;
    --accent-soft: #2a1a44;
    --gradient: linear-gradient(135deg, #3b82f6 0%, #a855f7 100%);
    --glow: 0 0 30px rgba(168, 85, 247, 0.25);
    --glow-strong: 0 0 60px rgba(168, 85, 247, 0.35);
    --semantic-success: #5fb87a;
    --semantic-warning: #f59e0b;
    --semantic-danger: #ff6b6b;
  }
  [data-theme="light"] {
    --bg: #f4f5f7;
    --paper: #ffffff;
    --surface-1: #ffffff;
    --surface-2: #ebecf0;
    --surface-3: #e0e2e8;
    --ink: #0a0d18;
    --ink-soft: #2a2d38;
    --ink-muted: #6a6d75;
    --ink-tertiary: #9ea0a8;
    --rule: #d8dae0;
    --rule-strong: #b6b9c2;
    --brand-blue: #2452c8;
    --brand-blue-deep: #1e3fa0;
    --accent: #7e3fc8;
    --accent-deep: #5e2898;
    --accent-soft: #ede0fa;
    --gradient: linear-gradient(135deg, #2452c8 0%, #7e3fc8 100%);
    --glow: 0 0 20px rgba(126, 63, 200, 0.15);
    --glow-strong: 0 0 40px rgba(126, 63, 200, 0.25);
    --semantic-success: #2da147;
    --semantic-warning: #b8860b;
    --semantic-danger: #c54545;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    transition: background 0.15s linear, color 0.15s linear;
    font-feature-settings: 'tnum' 1, 'cv11' 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background ambient — purple soft glow centered */
  body::before {
    content: '';
    position: fixed;
    top: 50%; left: 50%;
    width: 800px; height: 800px;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(168, 85, 247, 0.10) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  [data-theme="light"] body::before {
    background: radial-gradient(circle, rgba(126, 63, 200, 0.06) 0%, transparent 60%);
  }

  /* Top bar minimal — solo theme toggle + back link */
  .top-bar {
    position: relative;
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1;
  }
  .top-back {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-muted);
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }
  .top-back:hover { color: var(--ink); }
  .theme-toggle {
    background: transparent; border: 1px solid var(--rule-strong); color: var(--ink);
    padding: 6px 12px; font-family: 'JetBrains Mono', monospace; font-size: 11px;
    cursor: pointer; text-transform: uppercase; letter-spacing: 1px; border-radius: 4px;
  }
  .theme-toggle:hover { background: var(--ink); color: var(--bg); border-color: var(--ink); }

  /* Main centered container */
  .auth-main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    position: relative;
    z-index: 1;
  }

  .auth-card {
    width: 100%;
    max-width: 440px;
    background: var(--surface-1);
    border: 1px solid var(--rule);
    border-radius: 12px;
    padding: 40px 36px 32px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
  }
  [data-theme="light"] .auth-card {
    box-shadow: 0 8px 32px rgba(10, 13, 24, 0.06);
  }

  /* Wordmark hero — L25 PERMANENT */
  .wordmark-hero {
    font-family: 'Exo 2', sans-serif;
    font-weight: 700;
    font-size: 56px;
    letter-spacing: -2.5px;
    line-height: 1;
    color: var(--ink);
    text-align: center;
    margin-bottom: 12px;
    filter: drop-shadow(var(--glow-strong));
  }
  .wordmark-hero .y { color: var(--accent); }

  .auth-tagline {
    font-size: 14px;
    color: var(--ink-muted);
    text-align: center;
    margin-bottom: 28px;
  }

  /* Tenant context pill */
  .tenant-context {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface-2);
    border: 1px solid var(--rule);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 24px;
  }
  .tenant-avatar {
    width: 32px; height: 32px; flex-shrink: 0;
    border-radius: 6px;
    border: 2px solid var(--brand-blue);
    background: var(--bg);
    color: var(--accent);
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 11px;
    display: flex; align-items: center; justify-content: center;
    letter-spacing: 0.5px;
  }
  .tenant-info { flex: 1; min-width: 0; }
  .tenant-name {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: var(--ink);
    line-height: 1.2;
  }
  .tenant-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--ink-muted);
    letter-spacing: 0.5px;
    margin-top: 2px;
  }
  .tenant-switch {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--brand-blue);
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 1px;
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 4px 6px;
  }
  .tenant-switch:hover { color: var(--accent); }

  /* Form */
  .auth-form { display: flex; flex-direction: column; gap: 14px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--ink-muted);
    font-weight: 600;
  }
  .field-input {
    background: var(--surface-2);
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 12px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .field-input::placeholder { color: var(--ink-tertiary); }
  .field-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.15);
  }
  [data-theme="light"] .field-input:focus {
    box-shadow: 0 0 0 3px rgba(126, 63, 200, 0.10);
  }

  .field-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 2px;
    font-size: 12px;
  }
  .checkbox-label {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--ink-soft);
    cursor: pointer;
  }
  .checkbox-label input { accent-color: var(--accent); cursor: pointer; }
  .forgot-link {
    color: var(--brand-blue);
    text-decoration: none;
    font-weight: 500;
  }
  .forgot-link:hover { color: var(--accent); }

  /* Buttons */
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 12px 16px;
    border-radius: 6px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid transparent;
    transition: background 0.15s, border-color 0.15s;
    text-decoration: none;
  }
  .btn-primary {
    background: var(--accent);
    color: #ffffff;
    margin-top: 8px;
  }
  .btn-primary:hover { background: var(--accent-deep); }

  .btn-secondary {
    background: transparent;
    color: var(--ink);
    border-color: var(--rule-strong);
  }
  .btn-secondary:hover { border-color: var(--ink); background: var(--surface-2); }

  .btn-icon { width: 16px; height: 16px; flex-shrink: 0; }

  /* Divider */
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 20px 0 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--ink-muted);
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--rule);
  }

  /* SSO group */
  .sso-group { display: flex; flex-direction: column; gap: 10px; }

  /* Footnote */
  .auth-footnote {
    font-size: 12px;
    color: var(--ink-muted);
    text-align: center;
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid var(--rule);
  }
  .auth-footnote a { color: var(--brand-blue); text-decoration: none; }
  .auth-footnote a:hover { color: var(--accent); }

  /* Footer */
  .auth-footer {
    padding: 20px 24px 24px;
    text-align: center;
    font-size: 11px;
    color: var(--ink-tertiary);
    position: relative;
    z-index: 1;
  }
  .auth-footer .copy {
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
  }
  .auth-footer .wordmark-foot {
    font-family: 'Exo 2', sans-serif;
    font-weight: 700;
  }
  .auth-footer .wordmark-foot .y { color: var(--accent); }
  .auth-footer .links {
    margin-top: 8px;
    display: flex; justify-content: center; gap: 16px;
  }
  .auth-footer .links a {
    color: var(--ink-muted);
    text-decoration: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .auth-footer .links a:hover { color: var(--accent); }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    body, .field-input, .btn, .top-back, .forgot-link, .auth-footer .links a, .tenant-switch {
      transition: none !important;
    }
  }

  /* Mobile */
  @media (max-width: 480px) {
    .auth-card { padding: 32px 24px 24px; }
    .wordmark-hero { font-size: 44px; letter-spacing: -2px; }
  }
</style>
</head>
<body data-theme="dark">

<header class="top-bar">
  <a href="#" class="top-back">← heuresys.com</a>
  <button class="theme-toggle" id="themeToggle" type="button">DARK</button>
</header>

<main class="auth-main">
  <section class="auth-card" aria-labelledby="auth-heading">
    <h1 id="auth-heading" class="wordmark-hero">heures<span class="y">y</span>s</h1>
    <p class="auth-tagline">Accedi al tuo workspace</p>

    <div class="tenant-context" aria-label="Tenant corrente">
      <div class="tenant-avatar" aria-hidden="true">RB</div>
      <div class="tenant-info">
        <div class="tenant-name">RTL Bank</div>
        <div class="tenant-meta">rtl-bank.heuresys.com · Banking · Production</div>
      </div>
      <button type="button" class="tenant-switch" aria-label="Cambia tenant">CAMBIA</button>
    </div>

    <form class="auth-form" novalidate onsubmit="event.preventDefault();">
      <div class="field">
        <label class="field-label" for="email">Email aziendale</label>
        <input class="field-input" type="email" id="email" name="email"
               placeholder="maria.chro@rtl-bank.it" autocomplete="username" required />
      </div>

      <div class="field">
        <label class="field-label" for="password">Password</label>
        <input class="field-input" type="password" id="password" name="password"
               placeholder="••••••••••" autocomplete="current-password" required />
      </div>

      <div class="field-row">
        <label class="checkbox-label">
          <input type="checkbox" name="remember" />
          <span>Ricordami su questo dispositivo</span>
        </label>
        <a href="#" class="forgot-link">Password dimenticata?</a>
      </div>

      <button type="submit" class="btn btn-primary">Accedi</button>
    </form>

    <div class="divider"><span>oppure</span></div>

    <div class="sso-group">
      <button type="button" class="btn btn-secondary">
        <svg class="btn-icon" viewBox="0 0 23 23" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="1" y="1" width="10" height="10" fill="#f25022"/>
          <rect x="12" y="1" width="10" height="10" fill="#7fba00"/>
          <rect x="1" y="12" width="10" height="10" fill="#00a4ef"/>
          <rect x="12" y="12" width="10" height="10" fill="#ffb900"/>
        </svg>
        Continua con Microsoft 365
      </button>
      <button type="button" class="btn btn-secondary">
        <svg class="btn-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A10.99 10.99 0 0 0 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.99 10.99 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1A10.99 10.99 0 0 0 2.18 7.07l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z"/>
        </svg>
        Continua con Google Workspace
      </button>
    </div>

    <div class="auth-footnote">
      Non hai un account? <a href="#">Contatta il tuo IT_ADMIN</a>
      <br /> oppure <a href="#">richiedi una demo</a>
    </div>
  </section>
</main>

<footer class="auth-footer">
  <div class="copy">© 2026 <span class="wordmark-foot">heures<span class="y">y</span>s</span>.com — Organizational Intelligence platform</div>
  <div class="links">
    <a href="#">Privacy</a>
    <a href="#">Terms</a>
    <a href="#">Security</a>
    <a href="#">Status</a>
  </div>
</footer>

<script>
  // Theme persistence (localStorage key allineata Phase 9: 'heuresys-theme')
  (function () {
    const KEY = 'heuresys-theme';
    const body = document.body;
    const btn = document.getElementById('themeToggle');
    const stored = localStorage.getItem(KEY);
    if (stored === 'light' || stored === 'dark') {
      body.setAttribute('data-theme', stored);
    }
    function apply() {
      const t = body.getAttribute('data-theme') || 'dark';
      btn.textContent = t.toUpperCase();
    }
    apply();
    btn.addEventListener('click', function () {
      const cur = body.getAttribute('data-theme') || 'dark';
      const next = cur === 'dark' ? 'light' : 'dark';
      body.setAttribute('data-theme', next);
      localStorage.setItem(KEY, next);
      apply();
    });
  })();
</script>

</body>
</html>
