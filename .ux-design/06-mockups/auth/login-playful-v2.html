<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Accedi — heuresys (Magnetic Playful v2)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  /* heuresys Login — Magnetic Playful v2
     Mood: minimal-pop · 8 small shapes brand-blue+accent · 4 asymmetric motion paths · no tenant
     Logo: originale L27 (body brand-blue fisso + y accent fisso)
     Eccezione L27 plain text: indirizzi/link/domini
  */
  :root {
    --bg: #faf9f7;
    --paper: #ffffff;
    --surface-1: #ffffff;
    --surface-2: #f0eef5;
    --ink: #0a0d18;
    --ink-soft: #2a2d38;
    --ink-muted: #6a6d75;
    --ink-tertiary: #9ea0a8;
    --rule: #e2e0e8;
    --rule-strong: #c8c5d0;
    --primary: #2452c8;
    --primary-deep: #1e3fa0;
    --accent: #7e3fc8;
    --accent-deep: #5e2898;
    --accent-soft: #f1e7fa;
  }
  [data-theme="dark"] {
    --bg: #0a0d18;
    --paper: #14182a;
    --surface-1: #14182a;
    --surface-2: #1c2138;
    --ink: #f4f5f7;
    --ink-soft: #c8cad2;
    --ink-muted: #8b8e99;
    --ink-tertiary: #5e6168;
    --rule: #232838;
    --rule-strong: #3a4055;
    --primary: #3b82f6;
    --primary-deep: #2452c8;
    --accent: #a855f7;
    --accent-deep: #7e3fc8;
    --accent-soft: #2a1a44;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow-x: hidden; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased; line-height: 1.5;
    transition: background 0.2s linear, color 0.15s linear;
    font-feature-settings: 'tnum' 1, 'cv11' 1;
    display: flex; flex-direction: column; min-height: 100vh;
    position: relative;
  }

  /* L27 logo originale (logo canonico Heuresys) — body fisso brand-blue + y accent */
  .wordmark-original { font-family: 'Exo 2', sans-serif; font-weight: 700; color: var(--primary); letter-spacing: normal; text-transform: lowercase; }
  .wordmark-original .y { color: var(--accent); }
  .wm-inline { font-family: 'Exo 2', sans-serif; font-weight: 700; letter-spacing: normal; text-transform: lowercase; color: var(--primary); }
  .wm-inline .y { color: var(--accent); }

  /* Background shapes — 8 small in brand-blue + accent purple only */
  .shapes { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .shape {
    position: absolute;
    will-change: transform;
  }
  .shape.circle { border-radius: 50%; }
  .shape.square { border-radius: 14px; }
  .shape.pill   { border-radius: 999px; }
  .shape.blue   { background: var(--primary); opacity: 0.18; }
  .shape.acc    { background: var(--accent);     opacity: 0.18; }
  [data-theme="dark"] .shape.blue { opacity: 0.22; }
  [data-theme="dark"] .shape.acc  { opacity: 0.22; }

  /* Sizes deliberatamente piccoli */
  .s-1 { width: 84px; height: 84px; top: 12%; left: 6%;   animation: drift-rotate 8.4s ease-in-out infinite alternate; animation-delay: -0.6s; }
  .s-2 { width: 56px; height: 56px; top: 28%; left: 78%;  animation: bounce-tilt   6.2s cubic-bezier(0.45, 0, 0.55, 1) infinite; animation-delay: -2.1s; }
  .s-3 { width: 64px; height: 18px; top: 64%; left: 14%;  animation: flutter      11.3s linear infinite; animation-delay: -1.2s; transform-origin: 30% 50%; }
  .s-4 { width: 92px; height: 92px; top: 78%; left: 70%;  animation: scale-pulse   7.7s ease-in-out infinite; animation-delay: -3.4s; }
  .s-5 { width: 40px; height: 40px; top: 8%;  left: 52%;  animation: drift-rotate 10.1s ease-in-out infinite alternate-reverse; animation-delay: -4.8s; }
  .s-6 { width: 72px; height: 22px; top: 44%; left: 88%;  animation: flutter       9.1s linear infinite reverse; animation-delay: -0.3s; transform-origin: 70% 50%; }
  .s-7 { width: 48px; height: 48px; top: 88%; left: 30%;  animation: bounce-tilt   7.4s cubic-bezier(0.45, 0, 0.55, 1) infinite; animation-delay: -1.9s; }
  .s-8 { width: 60px; height: 60px; top: 52%; left: 44%;  animation: scale-pulse   6.6s ease-in-out infinite; animation-delay: -5.5s; }

  /* Asymmetric motion paths — 4 distinct keyframes */
  @keyframes drift-rotate {
    0%   { transform: translate(0, 0) rotate(0deg); }
    33%  { transform: translate(22px, -14px) rotate(38deg); }
    66%  { transform: translate(-12px, 18px) rotate(64deg); }
    100% { transform: translate(28px, 10px) rotate(96deg); }
  }
  @keyframes bounce-tilt {
    0%, 100% { transform: translateY(0)     rotate(-6deg) scale(1); }
    25%      { transform: translateY(-22px) rotate( 8deg) scale(1.06); }
    50%      { transform: translateY(0)     rotate(-2deg) scale(0.94); }
    75%      { transform: translateY(-14px) rotate(12deg) scale(1.03); }
  }
  @keyframes flutter {
    0%   { transform: translateX(0)    rotate(-8deg) skewX(0deg); }
    20%  { transform: translateX(-18px) rotate(-2deg) skewX(6deg); }
    50%  { transform: translateX(14px) rotate( 6deg) skewX(-4deg); }
    80%  { transform: translateX(-10px) rotate(-4deg) skewX(8deg); }
    100% { transform: translateX(0)    rotate(-8deg) skewX(0deg); }
  }
  @keyframes scale-pulse {
    0%, 100% { transform: scale(1)    translate(0, 0); }
    35%      { transform: scale(1.18) translate(-8px, -10px); }
    65%      { transform: scale(0.86) translate(12px, 6px); }
  }

  /* Top bar */
  .top-bar {
    position: relative; z-index: 2;
    padding: 18px 28px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .top-back {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--ink-muted); text-decoration: none;
    transition: color 0.15s, transform 0.2s;
  }
  .top-back:hover { color: var(--accent); transform: translateX(-3px); }
  .theme-toggle {
    background: var(--surface-1); border: 1px solid var(--rule); color: var(--ink);
    padding: 8px 14px; font-family: 'JetBrains Mono', monospace; font-size: 11px;
    cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
    border-radius: 999px;
    transition: background 0.2s, color 0.2s, transform 0.2s, border-color 0.2s;
  }
  .theme-toggle:hover { background: var(--accent); color: #fff; border-color: var(--accent); transform: rotate(8deg); }

  /* Main */
  .auth-main {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 32px 24px; position: relative; z-index: 1;
  }

  /* Card playful soft */
  .auth-card {
    width: 100%; max-width: 440px;
    background: var(--surface-1);
    border: 1px solid var(--rule);
    border-radius: 28px;
    padding: 48px 44px 36px;
    box-shadow: 0 30px 70px rgba(10, 13, 24, 0.08), 0 4px 12px rgba(168, 85, 247, 0.06);
    position: relative;
  }
  [data-theme="dark"] .auth-card {
    box-shadow: 0 30px 70px rgba(0, 0, 0, 0.45), 0 4px 12px rgba(168, 85, 247, 0.10);
  }

  /* Wordmark hero — L27 originale + parallax JS */
  .wordmark-hero {
    font-family: 'Exo 2', sans-serif;
    font-weight: 700; font-size: 60px;
    letter-spacing: -2.5px; line-height: 1;
    text-align: center; margin-bottom: 14px;
    color: var(--primary);
    text-transform: lowercase;
    transition: transform 0.18s cubic-bezier(0.22, 1, 0.36, 1);
    will-change: transform;
  }
  .wordmark-hero .y { color: var(--accent); }

  .auth-tagline {
    font-size: 14px; color: var(--ink-muted);
    text-align: center; margin-bottom: 36px;
  }

  /* Form — animated underline */
  .auth-form { display: flex; flex-direction: column; gap: 18px; }
  .field { display: flex; flex-direction: column; gap: 6px; position: relative; }
  .field-label {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--ink-muted); font-weight: 600;
  }
  .field-input-wrap {
    position: relative;
  }
  .field-input {
    width: 100%;
    background: transparent;
    border: none; border-bottom: 2px solid var(--rule);
    border-radius: 0; padding: 10px 0;
    font-family: 'Inter'; font-size: 16px; color: var(--ink);
    outline: none;
  }
  .field-input::placeholder { color: var(--ink-tertiary); }
  .field-underline {
    position: absolute; bottom: 0; left: 0;
    height: 2px; width: 0%;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    transition: width 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    pointer-events: none;
  }
  .field-input:focus ~ .field-underline { width: 100%; }

  .field-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 6px; font-size: 12px;
  }
  .checkbox-label { display: flex; align-items: center; gap: 8px; color: var(--ink-soft); cursor: pointer; }
  .checkbox-label input { accent-color: var(--accent); cursor: pointer; }
  .forgot-link {
    color: var(--primary); text-decoration: none; font-weight: 500;
    transition: color 0.15s, transform 0.18s;
  }
  .forgot-link:hover { color: var(--accent); transform: translateX(2px); }

  /* Buttons — magnetic */
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 14px 18px; border-radius: 14px;
    font-family: 'Inter'; font-size: 14px; font-weight: 600;
    cursor: pointer; border: 1px solid transparent; text-decoration: none;
    transition: transform 0.18s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.25s, background 0.2s, border-color 0.2s;
    will-change: transform;
  }
  .btn-primary {
    background: var(--accent); color: #ffffff;
    margin-top: 14px;
    box-shadow: 0 6px 18px rgba(168, 85, 247, 0.30);
  }
  .btn-primary:hover {
    background: var(--accent-deep);
    box-shadow: 0 12px 30px rgba(168, 85, 247, 0.45);
  }
  .btn-secondary {
    background: var(--surface-1); color: var(--ink);
    border-color: var(--rule);
  }
  [data-theme="dark"] .btn-secondary { background: var(--surface-2); }
  .btn-secondary:hover {
    border-color: var(--accent); background: var(--accent-soft);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(168, 85, 247, 0.18);
  }
  .btn-icon { width: 16px; height: 16px; flex-shrink: 0; }

  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 24px 0 16px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    text-transform: uppercase; letter-spacing: 1.5px; color: var(--ink-muted);
  }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--rule); }
  .sso-group { display: flex; flex-direction: column; gap: 10px; }

  .auth-footnote {
    font-size: 12px; color: var(--ink-muted); text-align: center;
    margin-top: 28px; padding-top: 22px; border-top: 1px dashed var(--rule);
  }
  .auth-footnote a { color: var(--primary); text-decoration: none; transition: color 0.15s; }
  .auth-footnote a:hover { color: var(--accent); }

  /* Footer */
  .auth-footer {
    padding: 22px 24px 28px; text-align: center;
    font-size: 11px; color: var(--ink-tertiary);
    position: relative; z-index: 1;
  }
  .auth-footer .copy { font-family: 'JetBrains Mono', monospace; letter-spacing: 0.5px; }
  .auth-footer .links { margin-top: 8px; display: flex; justify-content: center; gap: 16px; }
  .auth-footer .links a {
    color: var(--ink-muted); text-decoration: none;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    text-transform: uppercase; letter-spacing: 1px;
    transition: color 0.15s, transform 0.18s;
  }
  .auth-footer .links a:hover { color: var(--accent); transform: translateY(-2px); }

  @media (prefers-reduced-motion: reduce) {
    .shape, .wordmark-hero, .btn, .field-underline,
    .top-back, .forgot-link, .auth-footer .links a, .theme-toggle {
      animation: none !important; transition: none !important;
    }
  }
  @media (max-width: 480px) {
    .auth-card { padding: 36px 28px 28px; border-radius: 24px; }
    .wordmark-hero { font-size: 48px; letter-spacing: -2px; }
    .s-2, .s-5, .s-7 { display: none; }
  }
</style>
</head>
<body>

<div class="shapes" aria-hidden="true">
  <div class="shape circle blue s-1"></div>
  <div class="shape square acc  s-2"></div>
  <div class="shape pill   blue s-3"></div>
  <div class="shape circle acc  s-4"></div>
  <div class="shape square blue s-5"></div>
  <div class="shape pill   acc  s-6"></div>
  <div class="shape circle blue s-7"></div>
  <div class="shape circle acc  s-8"></div>
</div>

<header class="top-bar">
  <a href="#" class="top-back">← heuresys.com</a>
  <button class="theme-toggle" id="themeToggle" type="button">LIGHT</button>
</header>

<main class="auth-main">
  <section class="auth-card" aria-labelledby="auth-heading">
    <h1 id="auth-heading" class="wordmark-hero" data-parallax>heures<span class="y">y</span>s</h1>
    <p class="auth-tagline">Accedi al tuo workspace</p>

    <form class="auth-form" novalidate onsubmit="event.preventDefault();">
      <div class="field">
        <label class="field-label" for="email">Email aziendale</label>
        <div class="field-input-wrap">
          <input class="field-input" type="email" id="email" name="email" placeholder="maria.chro@rtl-bank.it" autocomplete="username" required />
          <span class="field-underline"></span>
        </div>
      </div>
      <div class="field">
        <label class="field-label" for="password">Password</label>
        <div class="field-input-wrap">
          <input class="field-input" type="password" id="password" name="password" placeholder="••••••••••" autocomplete="current-password" required />
          <span class="field-underline"></span>
        </div>
      </div>
      <div class="field-row">
        <label class="checkbox-label">
          <input type="checkbox" name="remember" />
          <span>Ricordami su questo dispositivo</span>
        </label>
        <a href="#" class="forgot-link">Password dimenticata?</a>
      </div>
      <button type="submit" class="btn btn-primary" data-magnetic>Accedi</button>
    </form>

    <div class="divider"><span>oppure</span></div>

    <div class="sso-group">
      <button type="button" class="btn btn-secondary" data-magnetic>
        <svg class="btn-icon" viewBox="0 0 23 23" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="1" y="1" width="10" height="10" fill="#f25022"/>
          <rect x="12" y="1" width="10" height="10" fill="#7fba00"/>
          <rect x="1" y="12" width="10" height="10" fill="#00a4ef"/>
          <rect x="12" y="12" width="10" height="10" fill="#ffb900"/>
        </svg>
        Continua con Microsoft 365
      </button>
      <button type="button" class="btn btn-secondary" data-magnetic>
        <svg class="btn-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A10.99 10.99 0 0 0 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.99 10.99 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1A10.99 10.99 0 0 0 2.18 7.07l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z"/>
        </svg>
        Continua con Google Workspace
      </button>
    </div>

    <div class="auth-footnote">
      Non hai un account? <a href="#">Contatta il tuo IT_ADMIN</a><br />
      oppure <a href="#">richiedi una demo</a>
    </div>
  </section>
</main>

<footer class="auth-footer">
  <div class="copy">© 2026 heuresys.com — Organizational Intelligence platform</div>
  <div class="links">
    <a href="#">Privacy</a><a href="#">Terms</a><a href="#">Security</a><a href="#">Status</a>
  </div>
</footer>

<script>
  /* Theme persistence */
  (function () {
    const KEY = 'heuresys-theme';
    const body = document.body;
    const btn = document.getElementById('themeToggle');
    const stored = localStorage.getItem(KEY);
    if (stored === 'light' || stored === 'dark') body.setAttribute('data-theme', stored);
    function apply() {
      const t = body.getAttribute('data-theme');
      btn.textContent = t === 'dark' ? 'DARK' : 'LIGHT';
    }
    apply();
    btn.addEventListener('click', function () {
      const cur = body.getAttribute('data-theme');
      const next = cur === 'dark' ? 'light' : 'dark';
      if (next === 'light') body.removeAttribute('data-theme'); else body.setAttribute('data-theme', 'dark');
      localStorage.setItem(KEY, next);
      apply();
    });
  })();

  /* Magnetic buttons */
  (function () {
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    const STRENGTH = 0.18;
    document.querySelectorAll('[data-magnetic]').forEach(function (el) {
      el.addEventListener('mousemove', function (e) {
        const rect = el.getBoundingClientRect();
        const x = e.clientX - rect.left - rect.width / 2;
        const y = e.clientY - rect.top - rect.height / 2;
        el.style.transform = 'translate(' + x * STRENGTH + 'px,' + y * STRENGTH + 'px)';
      });
      el.addEventListener('mouseleave', function () { el.style.transform = ''; });
    });
  })();

  /* Wordmark mouse parallax */
  (function () {
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
    const wm = document.querySelector('[data-parallax]');
    if (!wm) return;
    const STRENGTH = 6;
    document.addEventListener('mousemove', function (e) {
      const x = (e.clientX / window.innerWidth - 0.5) * STRENGTH;
      const y = (e.clientY / window.innerHeight - 0.5) * STRENGTH;
      wm.style.transform = 'translate(' + x + 'px,' + y + 'px)';
    });
  })();
</script>

</body>
</html>
