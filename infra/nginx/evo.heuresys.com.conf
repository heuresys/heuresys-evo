# Heuresys evo reverse proxy — RTG Phase 5 task 5.1 (2026-05-01)
#
# Pre-requisites:
#  - DNS A record evo.heuresys.com -> 80.225.82.207 ✅ closed 2026-05-01
#  - certbot installed: apt install certbot python3-certbot-nginx
#  - TLS issued: sudo certbot --nginx -d evo.heuresys.com
#
# Deploy (run on VM as root):
#  sudo cp /home/ubuntu/heuresys-evo/infra/nginx/evo.heuresys.com.conf /etc/nginx/sites-available/
#  sudo ln -sf /etc/nginx/sites-available/evo.heuresys.com.conf /etc/nginx/sites-enabled/
#  sudo nginx -t && sudo systemctl reload nginx
#  sudo certbot --nginx -d evo.heuresys.com --non-interactive --agree-tos -m admin@heuresys.com
#
# Bare-metal targets (NOT containers — see ADR-0001):
#  - app          (Next.js standalone) on 127.0.0.1:3200 via systemd `heuresys-app.service`
#  - api-gateway  (Express)            on 127.0.0.1:8200 via systemd `heuresys-api-gateway.service`

# HTTP -> HTTPS redirect (post certbot)
server {
    listen 80;
    listen [::]:80;
    server_name evo.heuresys.com;

    # Let's Encrypt ACME challenge path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS vhost
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name evo.heuresys.com;

    # TLS — managed by certbot --nginx (auto-fills these post issuance)
    # ssl_certificate     /etc/letsencrypt/live/evo.heuresys.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/evo.heuresys.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers (defense-in-depth, mirrors hardenedHelmet from api-gateway)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Body size for file uploads (CSV imports, document attachments)
    client_max_body_size 50M;

    # Frontend (Next.js services/app) — port 3200 (systemd-managed)
    location / {
        proxy_pass http://127.0.0.1:3200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # H2C smuggling defense (CWE-444): do NOT forward Upgrade header
        # to Next.js standalone backend.

        # Long-poll for SSE; HMR not used in production
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # API gateway — port 8200 (systemd-managed)
    location /api/ {
        # Strip /api/ prefix when proxying to api-gateway (which mounts routes
        # at /employees, /leaves, etc.). Use rewrite to drop the prefix.
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # API timeouts: 60s default, 5min for long-running enrichment jobs
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # NextAuth callback path (separate from /api/* gateway routes)
    location /auth/ {
        proxy_pass http://127.0.0.1:3200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Block public access to monitoring endpoints (Prometheus scrapes localhost only)
    location /metrics {
        deny all;
        return 403;
    }

    # Block access to admin endpoints from non-internal IPs (defense-in-depth;
    # primary auth via RBP TENANT_ADMIN/SUPERUSER role check at app layer)
    location /api/admin/ {
        # Allow only loopback + Heuresys office IPs (TBD — uncomment when known)
        # allow 192.0.2.0/24;
        # allow 127.0.0.1;
        # deny all;

        # For now: same proxy as /api/, but enforces app-layer RBP gate
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Logging (rotated by logrotate)
    access_log /var/log/nginx/evo.heuresys.com.access.log;
    error_log  /var/log/nginx/evo.heuresys.com.error.log warn;
}
